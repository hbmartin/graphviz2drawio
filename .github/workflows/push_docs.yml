name: Docs build

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.10'
        enable-cache: true

    - name: Build docs
      run: |
        uv sync --locked
        uv run --with sphinx sphinx-build doc/source doc/_build/html

    - uses: actions/upload-pages-artifact@v3
      with:
        path: doc/_build/html/

  deploy:
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
